<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b21a8"/>
      <stop offset="100%" stop-color="#1e1140"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg2)"/>
  <circle cx="700" cy="80" r="200" fill="#ffffff" opacity="0.05"/>
  <circle cx="60" cy="430" r="140" fill="#ffffff" opacity="0.06"/>

  <!-- Mock UI: live result bars -->
  <g transform="translate(60, 90)">
    <rect width="400" height="320" rx="16" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="22" y="40" font-family="Segoe UI" font-size="16" font-weight="700" fill="#ffffff">Résultats en direct</text>
    <circle cx="370" cy="32" r="6" fill="#22c55e">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="382" y="36" font-family="Segoe UI" font-size="11" fill="#a8b8e8">LIVE</text>

    <g font-family="Segoe UI" font-size="13" fill="#e8eaff">
      <text x="22" y="80">Option A</text>
      <text x="368" y="80" text-anchor="end" font-weight="700">42%</text>
      <rect x="22" y="88" width="356" height="14" rx="7" fill="#ffffff" opacity="0.10"/>
      <rect x="22" y="88" width="150" height="14" rx="7" fill="url(#bar)"/>

      <text x="22" y="138">Option B</text>
      <text x="368" y="138" text-anchor="end" font-weight="700">31%</text>
      <rect x="22" y="146" width="356" height="14" rx="7" fill="#ffffff" opacity="0.10"/>
      <rect x="22" y="146" width="110" height="14" rx="7" fill="url(#bar2)"/>

      <text x="22" y="196">Option C</text>
      <text x="368" y="196" text-anchor="end" font-weight="700">19%</text>
      <rect x="22" y="204" width="356" height="14" rx="7" fill="#ffffff" opacity="0.10"/>
      <rect x="22" y="204" width="68" height="14" rx="7" fill="url(#bar3)"/>

      <text x="22" y="254">Option D</text>
      <text x="368" y="254" text-anchor="end" font-weight="700">8%</text>
      <rect x="22" y="262" width="356" height="14" rx="7" fill="#ffffff" opacity="0.10"/>
      <rect x="22" y="262" width="28" height="14" rx="7" fill="#fff" opacity="0.6"/>
    </g>
    <text x="22" y="304" font-family="Segoe UI" font-size="11" fill="#9ba6d8">231 votes · WebSocket actif</text>
  </g>

  <!-- Right side: title -->
  <g transform="translate(500, 130)">
    <text font-family="Segoe UI Emoji" font-size="80">🗳️</text>
    <text y="130" font-family="Segoe UI" font-size="40" font-weight="800" fill="#ffffff">Vote temps</text>
    <text y="172" font-family="Segoe UI" font-size="40" font-weight="800" fill="#ffffff">réel</text>
    <text y="214" font-family="Segoe UI" font-size="15" fill="#c8cdf5">Admin &amp; votant en direct</text>
    <text y="236" font-family="Segoe UI" font-size="15" fill="#c8cdf5">Glassmorphism · WebSocket</text>

    <g font-family="Consolas" font-size="13" font-weight="700" fill="#ffffff">
      <g transform="translate(0, 260)">
        <rect width="74" height="26" rx="13" fill="#ffffff" opacity="0.18"/>
        <text x="14" y="18">Node.js</text>
      </g>
      <g transform="translate(82, 260)">
        <rect width="92" height="26" rx="13" fill="#ffffff" opacity="0.18"/>
        <text x="14" y="18">Socket.IO</text>
      </g>
      <g transform="translate(182, 260)">
        <rect width="80" height="26" rx="13" fill="#ffffff" opacity="0.18"/>
        <text x="14" y="18">Webpack</text>
      </g>
    </g>
  </g>
</svg>
