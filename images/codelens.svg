  <text x="40" y="142" font-family="Courier New" font-size="11" fill="#569cd6">  if</text>
  <text x="64" y="142" font-family="Courier New" font-size="11" fill="#d4d4d4"> (!res.ok) throw new </text>
  <text x="218" y="142" font-family="Courier New" font-size="11" fill="#4ec9b0">Error</text>
  <text x="40" y="160" font-family="Courier New" font-size="11" fill="#569cd6">  return</text>
  <text x="92" y="160" font-family="Courier New" font-size="11" fill="#dcdcaa"> res.json()</text>
  <text x="40" y="178" font-family="Courier New" font-size="11" fill="#d4d4d4">}</text>
