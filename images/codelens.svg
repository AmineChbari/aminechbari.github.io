  <text x="40" y="88" font-family="Courier New" font-size="11" fill="#569cd6">async function</text>
  <text x="156" y="88" font-family="Courier New" font-size="11" fill="#dcdcaa"> fetchUser</text>
  <text x="234" y="88" font-family="Courier New" font-size="11" fill="#d4d4d4">(id: </text>
  <text x="264" y="88" font-family="Courier New" font-size="11" fill="#4ec9b0">string</text>
